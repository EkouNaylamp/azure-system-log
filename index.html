<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Azure System Log Manager</title>
    <style>
        body { font-family: sans-serif; background: linear-gradient(135deg, #0078d4, #00bcf2); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 350px; }
        h2 { color: #0078d4; text-align: center; }
        select, input, button { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #0078d4; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #005a9e; }
        #status { margin-top: 15px; text-align: center; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <div class="card">
        <h2>System Log Hub</h2>
        <input type="text" id="node" placeholder="Nombre del Servidor (ej. SRV-01)">
        <select id="level">
            <option value="Information">Información</option>
            <option value="Warning">Advertencia</option>
            <option value="Critical">Crítico</option>
        </select>
        <input type="text" id="message" placeholder="Mensaje del evento">
        <button onclick="sendLog()">Enviar Log a Azure</button>
        <div id="status">Esperando envío...</div>
    </div>

    <script>
        async function sendLog() {
            const statusDiv = document.getElementById("status");
            const payload = {
                node: document.getElementById("node").value,
                level: document.getElementById("level").value,
                message: document.getElementById("message").value
            };

            if (!payload.node || !payload.message) {
                statusDiv.innerText = "⚠️ Completa todos los campos";
                return;
            }

            statusDiv.innerText = "Enviando...";

            try {
                // Cambiar esta URL por la de tu Azure Function cuando la despliegues
                const response = await fetch('/api/ProcessLog', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const data = await response.json();
                    statusDiv.style.color = "green";
                    statusDiv.innerText = "✅ " + data.status;
                } else {
                    statusDiv.innerText = "❌ Error en el servidor";
                }
            } catch (error) {
                statusDiv.innerText = "❌ Error de conexión";
            }
        }
    </script>
</body>
</html>
